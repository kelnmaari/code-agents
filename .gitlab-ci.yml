stages:
  - test
  - build
  - release

variables:
  BINARY_NAME: code-agents
  BUILD_DIR: build

# ─── Tests ────────────────────────────────────────────────────────────
test:
  stage: test
  image: golang:1.25.5
  script:
    - go vet ./...
    - go test -race -v ./...

# ─── Build ────────────────────────────────────────────────────────────
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  variables:
    VERSION: ${CI_COMMIT_TAG}
  before_script:
    - export VERSION=${CI_COMMIT_TAG#v}
  script:
    - docker build --build-arg VERSION=${VERSION} -t ${BINARY_NAME}:build .
    - container_id=$(docker create ${BINARY_NAME}:build)
    - docker cp ${container_id}:/build/ ./${BUILD_DIR}/
    - docker rm ${container_id}
    - ls -la ${BUILD_DIR}/
  artifacts:
    paths:
      - ${BUILD_DIR}/
    expire_in: 30 days

# ─── Release ─────────────────────────────────────────────────────────
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "Creating release ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "Release ${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: "${BINARY_NAME}-linux-amd64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${BUILD_DIR}/${BINARY_NAME}-linux-amd64?job=build"
        - name: "${BINARY_NAME}-linux-arm64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${BUILD_DIR}/${BINARY_NAME}-linux-arm64?job=build"
        - name: "${BINARY_NAME}-linux-386"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${BUILD_DIR}/${BINARY_NAME}-linux-386?job=build"
        - name: "${BINARY_NAME}-darwin-amd64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${BUILD_DIR}/${BINARY_NAME}-darwin-amd64?job=build"
        - name: "${BINARY_NAME}-darwin-arm64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${BUILD_DIR}/${BINARY_NAME}-darwin-arm64?job=build"
        - name: "${BINARY_NAME}-windows-amd64.exe"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${BUILD_DIR}/${BINARY_NAME}-windows-amd64.exe?job=build"
        - name: "${BINARY_NAME}-windows-arm64.exe"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${BUILD_DIR}/${BINARY_NAME}-windows-arm64.exe?job=build"
        - name: "${BINARY_NAME}-windows-386.exe"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${BUILD_DIR}/${BINARY_NAME}-windows-386.exe?job=build"
